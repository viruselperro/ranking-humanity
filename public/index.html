<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Q Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810; --surface: #0f0f1a; --surface2: #16162a;
    --border: #1e1e35; --border2: #2a2a45;
    --text: #d0d0e0; --text2: #7070a0; --text3: #404060;
    --accent: #4a4aff;
    --challenger: #FFD700; --grandmaster: #FF6B35; --master: #9F7AEA;
    --diamond: #63B3ED; --emerald: #68D391; --platinum: #4FD1C5;
    --gold: #ECC94B; --silver: #A0AEC0; --bronze: #C05621; --iron: #6B5B6B;
    --win: #4CAF7D; --loss: #E05555;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 20px; }
  .app { max-width: 900px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 0.5px solid var(--border2); }
  .title-main { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 600; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1; }
  .title-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .last-update { text-align: right; font-size: 11px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
  .last-update span { display: block; color: var(--text2); font-size: 13px; margin-top: 2px; }
  .cfg-toggle { font-size: 12px; color: var(--text3); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s; background: none; border: none; font-family: inherit; }
  .cfg-toggle:hover { color: var(--text2); }
  .cfg-panel { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 20px; margin-bottom: 28px; }
  .cfg-section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .cfg-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .cfg-row:last-child { margin-bottom: 0; }
  .cfg-label { font-size: 12px; color: var(--text2); min-width: 60px; }
  input[type="text"], input[type="password"] { flex: 1; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  button { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 12px; font-family: 'Inter', sans-serif; padding: 8px 14px; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s; letter-spacing: 0.03em; }
  button:hover { background: #1e1e35; border-color: #3a3a60; }
  button.primary { background: #1a1a5a; border-color: var(--accent); color: #aac; }
  button.primary:hover { background: #22226a; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 16px 0; }
  .error-msg { font-size: 12px; color: #e06060; background: #1e1010; border: 0.5px solid #3a1010; border-radius: 6px; padding: 8px 12px; margin-top: 10px; display: none; }
  .key-ok { font-size: 12px; color: var(--win); margin-left: 8px; display: none; }
  .tbl-header { display: grid; grid-template-columns: 44px 180px 1fr 140px 120px 100px; gap: 0 8px; padding: 0 12px 10px; border-bottom: 0.5px solid var(--border2); }
  .th { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .th.r { text-align: right; }
  .ranking { display: flex; flex-direction: column; gap: 2px; margin-top: 6px; }
  .p-row { display: grid; grid-template-columns: 44px 180px 1fr 140px 120px 100px; gap: 0 8px; align-items: center; padding: 10px 12px; border-radius: 8px; transition: background 0.12s; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .p-row:hover { background: var(--surface); }
  .p-row.top1 { background: linear-gradient(90deg, rgba(255,215,0,0.04) 0%, transparent 60%); }
  .p-row.top2 { background: linear-gradient(90deg, rgba(160,174,192,0.04) 0%, transparent 60%); }
  .p-row.top3 { background: linear-gradient(90deg, rgba(192,86,33,0.04) 0%, transparent 60%); }
  .rank-num { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 600; color: var(--text3); }
  .rank-num.r1 { color: var(--challenger); }
  .rank-num.r2 { color: var(--silver); }
  .rank-num.r3 { color: var(--bronze); }
  .alias-cell { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; flex-shrink: 0; border: 1px solid transparent; }
  .alias-name { font-size: 14px; font-weight: 500; color: #e0e0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alias-sub { font-size: 11px; color: var(--text3); }
  .riot-id-cell { font-size: 12px; color: var(--text2); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .riot-tag { color: var(--text3); }
  .tier-name { font-size: 13px; font-weight: 500; }
  .tier-lp { font-size: 11px; color: var(--text2); }
  .wl-cell { text-align: right; }
  .wl-line { font-size: 13px; }
  .ww { color: var(--win); }
  .ll { color: var(--loss); }
  .wr-line { font-size: 11px; color: var(--text2); }
  .wr-high { color: var(--win); }
  .wr-low { color: var(--loss); }
  .links-cell { display: flex; gap: 5px; justify-content: flex-end; align-items: center; }
  .site-link { font-size: 10px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 4px; padding: 3px 7px; color: var(--text2); text-decoration: none; letter-spacing: 0.04em; transition: background 0.12s, color 0.12s; cursor: pointer; }
  .site-link:hover { background: #1e1e40; color: #aac; }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 16px; padding: 2px 5px; cursor: pointer; border-radius: 4px; transition: color 0.12s; }
  .del-btn:hover { color: var(--loss); }
  .unranked { color: var(--text3); font-style: italic; font-size: 12px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; letter-spacing: 0.04em; }
  .refresh-bar { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 14px; }
  .loading-txt { font-size: 12px; color: var(--text3); display: none; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-block">
      <div class="title-main" id="rankTitle">Mi Ranking</div>
      <div class="title-sub">Solo Queue — LAS 2026</div>
    </div>
    <div class="last-update">Última actualización<span id="lastUpdate">—</span></div>
  </div>

  <button class="cfg-toggle" onclick="toggleCfg()">⚙ Configuración</button>

  <div class="cfg-panel" id="cfgPanel">
    <div class="cfg-section-label">API Key de Riot</div>
    <div class="cfg-row">
      <span class="cfg-label">Key</span>
      <input type="password" id="apiKey" placeholder="RGAPI-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
      <button class="primary" onclick="saveKey()">Guardar</button>
      <span class="key-ok" id="keyOk">✓ Guardada</span>
    </div>
    <div class="cfg-row">
      <span class="cfg-label">Título</span>
      <input type="text" id="titleInput" placeholder="Nombre del ranking" />
      <button onclick="applyTitle()">Aplicar</button>
    </div>
    <hr class="divider">
    <div class="cfg-section-label">Agregar jugador</div>
    <div class="cfg-row">
      <span class="cfg-label">Alias</span>
      <input type="text" id="aliasInput" placeholder="Nombre o apodo (opcional)" />
    </div>
    <div class="cfg-row">
      <span class="cfg-label">Riot ID</span>
      <input type="text" id="playerInput" placeholder="NombreJugador#TAG" onkeydown="if(event.key==='Enter')addPlayer()" />
      <button class="primary" onclick="addPlayer()">Agregar</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div id="mainSection" style="display:none">
    <div class="refresh-bar">
      <span class="loading-txt" id="loadTxt">Actualizando...</span>
      <button onclick="refreshAll()">↺ Actualizar todos</button>
    </div>
    <div class="tbl-header">
      <div class="th">#</div>
      <div class="th">Jugador</div>
      <div class="th">Cuenta LoL</div>
      <div class="th">Elo</div>
      <div class="th r">W / L</div>
      <div class="th r">Links</div>
    </div>
    <div class="ranking" id="rankingList"></div>
  </div>
  <div class="empty-state" id="emptyState">Guardá tu API key y agregá jugadores para ver el ranking.</div>
</div>

<script>
const TIER_ORDER = ['CHALLENGER','GRANDMASTER','MASTER','DIAMOND','EMERALD','PLATINUM','GOLD','SILVER','BRONZE','IRON'];
const DIV_ORDER = {I:1,II:2,III:3,IV:4};
const TIER_COLOR = {
  CHALLENGER:'#FFD700', GRANDMASTER:'#FF6B35', MASTER:'#9F7AEA',
  DIAMOND:'#63B3ED', EMERALD:'#68D391', PLATINUM:'#4FD1C5',
  GOLD:'#ECC94B', SILVER:'#A0AEC0', BRONZE:'#C05621', IRON:'#6B5B6B'
};
const AVATAR_BG = [
  ['#1a1a4a','#9F7AEA'],['#0a2a1a','#68D391'],['#2a1a0a','#ECC94B'],
  ['#2a0a0a','#FF6B35'],['#0a1a2a','#63B3ED'],['#1a0a2a','#C05621'],
  ['#0a2a2a','#4FD1C5'],['#2a1a2a','#A0AEC0'],
];

let players = [];
let apiKey = '';
let cfgOpen = true;

// Detecta si está corriendo en local o en producción
const BASE_URL = 'https://noisy-mouse-b9a6.eliaselputomejor.workers.dev';

function toggleCfg() {
  cfgOpen = !cfgOpen;
  document.getElementById('cfgPanel').style.display = cfgOpen ? 'block' : 'none';
}
function saveKey() {
  const v = document.getElementById('apiKey').value.trim();
  if (!v.startsWith('RGAPI-')) { showErr('La key debe empezar con RGAPI-'); return; }
  apiKey = v;
  document.getElementById('keyOk').style.display = 'inline';
  hideErr();
}
function applyTitle() {
  const v = document.getElementById('titleInput').value.trim();
  if (v) document.getElementById('rankTitle').textContent = v;
}
function showErr(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.style.display = 'block'; }
function hideErr() { document.getElementById('errorMsg').style.display = 'none'; }
function setLoading(on) { document.getElementById('loadTxt').style.display = on ? 'inline' : 'none'; }

async function addPlayer() {
  if (!apiKey) { showErr('Primero guardá tu API key.'); return; }
  const raw = document.getElementById('playerInput').value.trim();
  if (!raw.includes('#')) { showErr('Formato: NombreJugador#TAG'); return; }
  const [gameName, tagLine] = raw.split('#');
  const alias = document.getElementById('aliasInput').value.trim();
  if (players.find(p => p.gameName.toLowerCase()===gameName.toLowerCase() && p.tagLine.toLowerCase()===tagLine.toLowerCase())) {
    showErr('Ya está en la lista.'); return;
  }
  hideErr();
  setLoading(true);
  try {
    const data = await fetchRank(gameName, tagLine, alias);
    players.push(data);
    document.getElementById('playerInput').value = '';
    document.getElementById('aliasInput').value = '';
    render();
  } catch(e) { showErr(e.message); }
  setLoading(false);
}

async function fetchRank(gameName, tagLine, alias) {
  const res = await fetch(
    `${BASE_URL}?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}`,
    { headers: { 'x-api-key': apiKey } }
  );
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
  return { ...data, alias: alias || gameName, hasAlias: !!alias };
}

function score(p) {
  const ti = TIER_ORDER.indexOf(p.tier);
  if (ti===-1) return -1;
  const di = p.rank ? (4-(DIV_ORDER[p.rank]||4)) : 0;
  return (TIER_ORDER.length-1-ti)*10000 + di*1000 + p.lp;
}

function render() {
  const sorted = [...players].sort((a,b)=>score(b)-score(a));
  const hasPl = players.length > 0;
  document.getElementById('mainSection').style.display = hasPl ? 'block' : 'none';
  document.getElementById('emptyState').style.display = hasPl ? 'none' : 'block';
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('rankingList').innerHTML = sorted.map((p, i) => {
    const origIdx = players.findIndex(pl => pl.gameName===p.gameName && pl.tagLine===p.tagLine);
    const color = TIER_COLOR[p.tier] || '#555';
    const [abg, atxt] = AVATAR_BG[i % AVATAR_BG.length];
    const initials = p.alias.slice(0,2).toUpperCase();
    const rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const topCls = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const wr = p.wins+p.losses>0 ? Math.round(p.wins*100/(p.wins+p.losses)) : 0;
    const wrCls = wr>=55?'wr-high':wr<45?'wr-low':'';
    const tierLabel = p.tier==='UNRANKED' ? '' : p.tier.charAt(0)+p.tier.slice(1).toLowerCase()+(p.rank?' '+p.rank:'');
    const opggUrl = `https://www.op.gg/summoners/las/${encodeURIComponent(p.gameName)}-${encodeURIComponent(p.tagLine)}`;
    const ugUrl = `https://u.gg/lol/profile/las1/${encodeURIComponent(p.gameName+'-'+p.tagLine)}/overview`;

    return `<div class="p-row ${topCls}">
      <div class="rank-num ${rc}">${i+1}</div>
      <div class="alias-cell">
        <div class="avatar" style="background:${abg};color:${atxt};border-color:${atxt}33">${initials}</div>
        <div>
          <div class="alias-name">${p.alias}</div>
          ${p.hasAlias ? `<div class="alias-sub">${p.gameName}</div>` : ''}
        </div>
      </div>
      <div class="riot-id-cell">${p.gameName}<span class="riot-tag"> #${p.tagLine}</span></div>
      <div class="elo-cell">
        ${p.tier==='UNRANKED'
          ? '<span class="unranked">Sin rango</span>'
          : `<div class="tier-name" style="color:${color}">${tierLabel}</div><div class="tier-lp">${p.lp} LP</div>`}
      </div>
      <div class="wl-cell">
        ${p.tier==='UNRANKED' ? '<span class="unranked">—</span>' : `
          <div class="wl-line"><span class="ww">${p.wins}W</span> / <span class="ll">${p.losses}L</span></div>
          <div class="wr-line ${wrCls}">${wr}% WR</div>`}
      </div>
      <div class="links-cell">
        <a class="site-link" href="${opggUrl}" target="_blank">OP.GG</a>
        <a class="site-link" href="${ugUrl}" target="_blank">U.GG</a>
        <button class="del-btn" onclick="removePlayer(${origIdx})">×</button>
      </div>
    </div>`;
  }).join('');
}

function removePlayer(idx) { players.splice(idx,1); render(); }

async function refreshAll() {
  if (!apiKey) { showErr('No hay API key guardada.'); return; }
  setLoading(true); hideErr();
  try {
    players = await Promise.all(players.map(p => fetchRank(p.gameName, p.tagLine, p.hasAlias ? p.alias : '')));
    render();
  } catch(e) { showErr(e.message); }
  setLoading(false);
}
</script>
</body>
</html>
